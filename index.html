function tn(f,t0,d,ty,g){if(!AU.ctx)return;const c=AU.ctx,o=c.createOscillator(),gn=c.createGain();
 o.type=ty||'square';o.frequency.value=f;gn.gain.setValueAtTime(g||.06,c.currentTime+t0);
 gn.gain.exponentialRampToValueAtTime(.001,c.currentTime+t0+d);o.connect(gn);gn.connect(AU.master);
 o.start(c.currentTime+t0);o.stop(c.currentTime+t0+d+.05);}
function sw(f0,f1,t0,d,ty,g){if(!AU.ctx)return;const c=AU.ctx,o=c.createOscillator(),gn=c.createGain();
 o.type=ty||'sawtooth';o.frequency.setValueAtTime(f0,c.currentTime+t0);
 o.frequency.exponentialRampToValueAtTime(f1,c.currentTime+t0+d);
 gn.gain.setValueAtTime(g||.08,c.currentTime+t0);gn.gain.exponentialRampToValueAtTime(.001,c.currentTime+t0+d);
 o.connect(gn);gn.connect(AU.master);o.start(c.currentTime+t0);o.stop(c.currentTime+t0+d+.05);}
function nb_(t0,d,f,g,q){if(!AU.ctx)return;const c=AU.ctx,s=c.createBufferSource();s.buffer=AU.nb;
 const bf=c.createBiquadFilter();bf.type='bandpass';bf.frequency.value=f;bf.Q.value=q||1.2;
 const gn=c.createGain();gn.gain.setValueAtTime(g,c.currentTime+t0);
 gn.gain.exponentialRampToValueAtTime(.001,c.currentTime+t0+d);
 s.connect(bf);bf.connect(gn);gn.connect(AU.master);s.start(c.currentTime+t0);s.stop(c.currentTime+t0+d+.05);}

let camMode=false;
const vf=document.getElementById('vfinder'), shootBtn=document.getElementById('shootBtn'), camBtn=document.getElementById('camBtn');
function setCamMode(b){
 if(b && (!G.camera||G.uiOpen||G.over)) return;
 camMode=!!b;
 vf.style.display=camMode?'block':'none';
 shootBtn.style.display=camMode?'block':'none';
 camBtn.classList.toggle('on',camMode);
 const self = camMode && G.hall.mirrorSeen && !G.hall.selfShot;
 const rec = vf.querySelector('.rec');
 if(rec) rec.textContent = self ? '🤳 셀프 촬영 · 스스로를 담아라' : '● 촬영 대기';
 vf.classList.toggle('self', self);

}
camBtn.addEventListener('click',()=>setCamMode(!camMode));

function takePhoto(){
 if(!camMode||G.uiOpen||G.over) return;
 shutterFx();
 // 거울을 본 뒤 → 셀프 촬영(마지막 한 장 = 나 자신)
 if(G.hall.mirrorSeen && !G.hall.selfShot){
  G.hall.selfShot=1; G.photos.hall=1; renderFrags();
  redFlash(.35); setTimeout(sOk,180);
  toast('마지막 한 장 — 거울에도 없던 나를, 필름에 담았다.');
  setObj('중앙현관 문으로 — 이제 나갈 수 있다');
  setCamMode(false);
  return;
 }
 const pray=new THREE.Raycaster();
 let got=null;
 for(const t of photoTargets){
  if(!t.obj.visible||G.photos[t.id]) continue;
  const wp=new THREE.Vector3(); t.obj.getWorldPosition(wp);
  const dist=wp.distanceTo(camera.position);
  if(dist>7||dist<0.35) continue;
  const sp=wp.clone().project(camera);
  if(sp.z>1||Math.abs(sp.x)>.40||Math.abs(sp.y)>.34) continue;   // 프레임 안에 들어와야 함
  const dir=wp.clone().sub(camera.position).normalize();
  pray.set(camera.position,dir);
  const hits=pray.intersectObjects(scene.children,true);
  let blockedBy=false;
  for(const h of hits){
   if(h.object===t.obj) break;
   if(h.object.visible && h.distance < dist-0.12 && h.object.material && h.object.material.visible!==false){ blockedBy=true; break; }
  }
  if(blockedBy) continue;
  got=t; break;
 }
 if(got){
  G.photos[got.id]=1; renderFrags(); setTimeout(sOk,180);
  toast('필름에 담겼다 — '+got.name);
  if(got.onShot) got.onShot();
 } else {
  toast('…사진에 아무것도 담기지 않았다.');
 }
}

/* ===== 방송실 — 오실로스코프 파형 맞추기 (소리의 3요소) ===== */
const FREQL=['낮음','중간','높음'], AMPL=['작음','중간','큼'], WAVEL=['매끈함','거칢'];
// 목표(테이프 속 목소리): 높은 진동수 + 작은 진폭 + 거친 음색
const BRO_ANS={freq:2, amp:0, wave:1};
function broWavePath(freq,amp,jag,W,H){
 const cy=H/2, cyc=[2.2,4,7][freq], a=[8,18,30][amp];
 let d='';
 for(let px=0;px<=W;px+=2){const ph=px/W*cyc*Math.PI*2;
  const s=jag ? (2/Math.PI)*Math.asin(Math.sin(ph))   // 삼각파 — 뾰족한 꼭짓점(미분불가)
              : Math.sin(ph);                          // 사인 — 부드러움
  const yy=cy-s*a; d+=(px===0?'M':'L')+px+' '+yy.toFixed(1)+' ';}
 return d;
}
function broWaveSVG(freq,amp,wave){
 const W=300,H=120;
 let grid='';
 for(let i=0;i<=10;i++)grid+=`<line x1="${i*W/10}" y1="0" x2="${i*W/10}" y2="${H}" stroke="rgba(80,255,160,.10)"/>`;
 for(let i=0;i<=4;i++)grid+=`<line x1="0" y1="${i*H/4}" x2="${W}" y2="${i*H/4}" stroke="rgba(80,255,160,.10)"/>`;
 const cur=broWavePath(freq,amp,wave,W,H);
 return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:126px;background:#05100a;border:1px solid #2b5a3f;border-radius:4px">
  ${grid}<path d="${cur}" fill="none" stroke="#4fe08a" stroke-width="2.4"/></svg>`;
}

 if(Pl.level===0&&Pl.x<-10) return '0_gymhall';
 if(Pl.x>-9.7&&Pl.x<-3.5){ if(Pl.z>10.6&&Pl.z<16.4)return Pl.level+'_0'; if(Pl.z>19.6&&Pl.z<25.4)return Pl.level+'_1'; }
 return null;
}
function autoDoors(){
 const r=roomOf();
 if(r&&r!=='0_1'&&ROOMDOOR[r]){          // 화장실(0_1)은 잠그지 않음 (재미용)
  const D=ROOMDOOR[r];
  if(!D.closed && !D.noAutoClose && D.animTo===undefined){
   closeDoor(D,true);
   const msg={'1_1':'도서실 문이 닫히며 잠겼다 — 다 마쳐야 나갈 수 있다',
              '0_0':'체육관 문이 닫히며 잠겼다 — 이름 없는 유니폼을 사진에 담아라',
              '2_0':'과학실 문이 닫히며 잠겼다 — 백골에게 머리를 되찾아 주어라',
              '2_1':'방송실 문이 닫히며 잠겼다 — 출처 없는 목소리를 담아라'}[r];
   if(msg){ toast(msg); }
  }
 }
}

/* ---------- 루프 ---------- */
const clkEl=document.getElementById('clock'),tmEl=document.getElementById('timer'),flEl=document.getElementById('floorTag');
const RM={0:['체육관','화장실'],1:['2학년 3반','도서실'],2:['과학실','방송실']};
/* ===== 성능 최적화: 근접 점광원만 켜기 (모바일 GPU 부하↓) =====
   씬의 점광원이 40개가 넘어 프래그먼트당 조명 계산이 과도 → 디벗에서 렉.
   플레이어와 가까운 MAXPL개만 visible로 유지(개수 고정 → 셰이더 재컴파일 없음). */
const allPL=[]; scene.traverse(o=>{ if(o.isPointLight) allPL.push(o); });
const MAXPL = IS_MOBILE ? 7 : 18;
let cullAcc = 0;
function cullLights(){
 const cx=camera.position.x, cy=camera.position.y, cz=camera.position.z;
 for(const L of allPL){ const dx=L.position.x-cx,dy=L.position.y-cy,dz=L.position.z-cz;
   L.userData._d = dx*dx+dy*dy+dz*dz; }
 allPL.sort((a,b)=>a.userData._d-b.userData._d);
 for(let i=0;i<allPL.length;i++){ const v=(i<MAXPL); if(allPL[i].visible!==v) allPL[i].visible=v; }
}
camera.position.set(Pl.x,Pl.y+EYE,Pl.z); cullLights();   // 첫 프레임부터 컬링 적용

let last=performance.now(),stepAcc=0,hb=0,br=0;
let bounceT=0, bouncePat=0;
function loop(now){
 requestAnimationFrame(loop);
 const dt=Math.min(.05,(now-last)/1000);last=now;const t=now/1000;

 voidTex.offset.x+=dt*.008;voidTex.offset.y+=dt*.003;
 recL.material.emissiveIntensity=(Math.sin(t*4.5)>0)?1:.05;
 pulsers.forEach((m,i)=>m.material.emissiveIntensity=.3+.25*Math.sin(t*3+i*1.7));
 const bo=blackoutT>0,lit=G.flashlight;
 cLights.forEach(o=>{let v=.5+.08*Math.sin(t*9+o.ph);
  if(o.bad&&Math.sin(t*13+o.ph)>.86)v=.05;if(Math.random()<.004)v*=.2;
  o.L.intensity=(!lit||bo)?0:v;});
 rLights.forEach(l=>l.intensity=(!lit||bo)?0:.34);
 flash.intensity=!lit?0:(bo?.4:1.35);
 if(blackoutT>0){blackoutT-=dt;if(blackoutT<=0)document.getElementById('blackout').style.opacity=0;}
 if(G.jsCool>0)G.jsCool-=dt;
 if(dripL.intensity>0)dripL.intensity=.25+.25*Math.abs(Math.sin(t*1.3));

 [gymDoors.l,gymDoors.r].forEach(o=>{ if(o&&o.hg.userData.to!==undefined){
  const to=o.hg.userData.to;
  o.hg.rotation.y+=(to-o.hg.rotation.y)*Math.min(1,dt*1.6);
  if(Math.abs(to-o.hg.rotation.y)<.02){o.hg.rotation.y=to;delete o.hg.userData.to;} }});
 doorsList.forEach(D=>{ if(D.animTo!==undefined){
  D.hg.rotation.y+=(D.animTo-D.hg.rotation.y)*Math.min(1,dt*2.4);
  if(Math.abs(D.animTo-D.hg.rotation.y)<.02){D.hg.rotation.y=D.animTo;delete D.animTo;} }});
 if(window.__cabHg && window.__cabHg.userData.to!==undefined){
  const to=window.__cabHg.userData.to;
  window.__cabHg.rotation.y+=(to-window.__cabHg.rotation.y)*Math.min(1,dt*2.6);
  if(Math.abs(to-window.__cabHg.rotation.y)<.02){window.__cabHg.rotation.y=to;delete window.__cabHg.userData.to;}
 }
 if(gymLockerDoor && gymLockerDoor.userData.to!==undefined){
  const to=gymLockerDoor.userData.to;
  gymLockerDoor.rotation.y+=(to-gymLockerDoor.rotation.y)*Math.min(1,dt*2.6);
  if(Math.abs(to-gymLockerDoor.rotation.y)<.02){gymLockerDoor.rotation.y=to;delete gymLockerDoor.userData.to;}
 }
 lockerDoors.forEach(L=>{ if(L.animTo!==undefined){
  L.hg.rotation.y+=(L.animTo-L.hg.rotation.y)*Math.min(1,dt*3);
  if(Math.abs(L.animTo-L.hg.rotation.y)<.02){L.hg.rotation.y=L.animTo;delete L.animTo;} }});

 for(let i=fallers.length-1;i>=0;i--){const f=fallers[i];
  f.vy-=15*dt; f.m.position.y+=f.vy*dt; f.m.position.x+=f.vx*dt; f.m.position.z+=f.vz*dt;
  f.m.rotation.x+=f.rx*dt; f.m.rotation.z+=f.rz*dt; f.vx*=.985; f.vz*=.985;
  if(f.m.position.y<=f.gy){ f.m.position.y=f.gy; f.m.rotation.x=Math.PI/2*(Math.random()<.5?1:-1);
   f.m.rotation.z=Math.random()*3; fallers.splice(i,1); }}
 stalls.forEach(s=>{if(s.vel!==0){s.hg.rotation.y+=s.vel*dt;if(s.hg.rotation.y<=0){s.hg.rotation.y=0;s.vel=0;}}});
 if(lockerWall.userData.shake>0){lockerWall.position.z=16.7+Math.sin(t*70)*.02;
  lockerWall.userData.shake-=dt;if(lockerWall.userData.shake<=0)lockerWall.position.z=16.7;}
 if(shadSt&&!shadSt.hold){shadSt.t+=dt;const k2=Math.min(1,shadSt.t/shadSt.dur);
  shad.position.x=shadSt.from+(shadSt.to-shadSt.from)*k2;
  if(k2>=1){shad.visible=false;shadSt=null;}}
 if(ghostBall&&ghostBall.userData.act){
  const u=ghostBall.userData;
  u.vy-=16*dt; ghostBall.position.y+=u.vy*dt;
  if(ghostBall.position.y<=.122){ ghostBall.position.y=.122;
   if(Math.abs(u.vy)>.4){ u.vy=-u.vy*.52; u.n++; sBounce(Math.min(1,Math.abs(u.vy)/4)); }
   else { u.vy=0; u.act=0; }
  }
 }
 if(girl.visible){
  girl.rotation.set(0, Math.atan2(Pl.x-girl.position.x, Pl.z-girl.position.z), 0);  // 수평 회전만
  girl.position.y=FL[1]; }
 if(window.__broReel){ window.__broReel.forEach(r=>{ r.rotation.y+=dt*2.4; }); }
 if(G.bro.solved && window.__tvL){
  window.__tvL.intensity=.7+.35*Math.sin(t*9)+ (Math.random()<.04?.5:0);
 }
 if(broBerserk && !G.over){
  broBerserkT-=dt;
  if(Math.random()<dt*1.2){ redFlash(.22); }
  if(broBerserkT<=0){ broBerserkT=6.3; sSiren(); glitchFx(); jolt(); }
 }

 if(mirrorSeq){
  mirrorSeq.t+=dt;
  const due=.4+mirrorSeq.idx*.55;
  if(mirrorSeq.idx<MIR.length&&mirrorSeq.t>due)mirrorLetter();
  if(mirrorSeq.idx>=MIR.length){mirrorSeq.graceT+=dt;
   if(mirrorSeq.graceT>4){mirrorSeq=null;G.fired.mirror=1;sWhis();}}
  if(mirrorSeq&&angDiff(Pl.yaw,mirrorSeq.yaw0)>2.2)ghostAttack();}

 if(G.started&&!G.over){
  G.seconds-=dt;
  if(G.seconds<=0){G.seconds=0;lose();}
  if(G.seconds<=600&&!G.fired.time10)fireBC('time10');
  tmEl.textContent=fmt(G.seconds);tmEl.className=G.seconds<=300?'danger':'';
  const el=1800-G.seconds,tot=14*60+el;
  clkEl.textContent='현재 00:'+String(Math.floor(tot/60)).padStart(2,'0')+' · 봉쇄 00:44';
  if(G.seconds<=300&&AU.ctx){hb+=dt;if(hb>.78){hb=0;tn(58,0,.12,'sine',.12);tn(52,.16,.1,'sine',.08);}}
  br+=dt;if(br>4.5){br=0;nb_(0,.5,420,.018,2);}
  // 체육관: 끊이지 않는 공 튀는 소리 (문 너머 → 코트 안)
  if(!G.gym.ballSilent && (lit && Pl.level===0 && Pl.x<-2 && Pl.z>9.5 && Pl.z<18.5 || (lit&&Pl.level===0&&Pl.x<-10))){
   bounceT-=dt;
   if(bounceT<=0){
    const far = !gymDoors.open || Pl.x>-10;      // 문 너머면 먹먹하게
    const near = (Pl.x<-11);
    sBounce(near?1.0:(far?.34:.6));
    bouncePat=(bouncePat+1)%7;
    bounceT = (bouncePat===6) ? (1.9+Math.random()*1.4) : (.62+Math.random()*.16);
   }
  }
  if(lit&&G.seconds<=180&&Math.random()<dt*.05)jumpscareFront(1);
  if(lit&&Math.random()<dt*.03)windowFace();

  if(!G.uiOpen){
   let mx=0,mz=0;
   if(keys['KeyW']||keys['ArrowUp'])mz-=1;
   if(keys['KeyS']||keys['ArrowDown'])mz+=1;
   if(keys['KeyA']||keys['ArrowLeft'])mx-=1;
   if(keys['KeyD']||keys['ArrowRight'])mx+=1;
   mx+=sv.x;mz+=sv.y;
   const ml=Math.hypot(mx,mz),sp2=(keys['ShiftLeft']||keys['ShiftRight'])?1.5:1;
   if(ml>.01){
    mx/=Math.max(1,ml);mz/=Math.max(1,ml);
    const sp=3.4*sp2*dt;
    const dx=(mx*Math.cos(Pl.yaw)+mz*Math.sin(Pl.yaw))*sp;
    const dz=(-mx*Math.sin(Pl.yaw)+mz*Math.cos(Pl.yaw))*sp;
    const can=(nx,nzz)=>{const g=groundAt(nx,nzz,Pl.y);
     if(g===null)return false;
     if(g>Pl.y+.62)return false;
     const feet=Math.max(Pl.y,g);              // 올라선 뒤의 발 높이로 판정 → 책상 등반 가능
     if(blocked(nx,nzz,feet))return false;
     return true;};
    if(can(Pl.x+dx,Pl.z))Pl.x+=dx;
    if(can(Pl.x,Pl.z+dz))Pl.z+=dz;
    Pl.bob+=dt*9*sp2;
    stepAcc+=dt;if(stepAcc>(sp2>1?.33:.46)){stepAcc=0;Pl.onStair?sStair():sStep();}
   }
   const g=groundAt(Pl.x,Pl.z,Pl.y);
   Pl.vy-=14*dt;Pl.y+=Pl.vy*dt;
   if(g!==null&&Pl.y<=g+.02&&Pl.vy<=0){if(!Pl.ground&&Pl.vy<-2.5)sLand();Pl.y=g;Pl.vy=0;Pl.ground=true;}
   else if(g!==null&&Pl.y<g){Pl.y=g;Pl.vy=0;Pl.ground=true;}
   else Pl.ground=false;
   if(Pl.y<-8){Pl.y=FL[0];Pl.x=0;Pl.z=6;Pl.vy=0;}
   let bl2=0,bd2=99;FL.forEach((fy,i)=>{const d=Math.abs(Pl.y-fy);if(d<bd2){bd2=d;bl2=i;}});
   Pl.level=bl2;
   Pl.onStair=(Pl.x>2.5&&Pl.z>STAIR.zA-.5);
   const inA=(Pl.x>-10&&Pl.x<-2&&Pl.z>10&&Pl.z<17),inB=(Pl.x>-10&&Pl.x<-2&&Pl.z>19&&Pl.z<26);
   const inGym=(Pl.level===0&&Pl.x<-10);
   const inC=(Pl.x>-2&&Pl.x<2&&Pl.z>8);
   flEl.textContent=FN[Pl.level]+' · '+(inGym?'체육관':inA?RM[Pl.level][0]:inB?RM[Pl.level][1]:Pl.onStair?'계단실':(Pl.level===0&&Pl.z<8)?'중앙현관':'복도');
   if(G.pending&&(inC||Pl.onStair)){const k2=G.pending;G.pending=null;setTimeout(()=>fireBC(k2),450);}
   // 과학실(실험실) 첫 입장 안내
   if(!G.sci.entered && Pl.level===2 && Pl.x>LAB.x1 && Pl.x<LAB.x2 && Pl.z>LAB.z1 && Pl.z<LAB.z2){
    G.sci.entered=1; sWhis();
    toast('받침대 위에 백골 모형이 보인다… 그런데 머리가 없다.');
    setObj('머리 없는 백골 모형을 조사해 보자');
   }
   // 방송실 첫 입장 안내
   if(!G.bro.entered && Pl.level===2 && Pl.x>-10 && Pl.x<-2 && Pl.z>19 && Pl.z<26){
    G.bro.entered=1; sWhis();
    toast('꺼져 있던 방송 장비에서, 저절로 목소리가 흘러나온다…');
    setObj('방송 장비를 조사하고, 오실로스코프 콘솔을 살펴보자');
   }
   // 중앙현관 도착 안내 (사진 4장 완료 후) — 거울을 살펴보라
   if(!G.hall.arrived && !G.hall.selfShot && Pl.level===0 && Pl.z<7.6 && photoCount()>=4){
    G.hall.arrived=1; sWhis();
    toast('중앙현관 — 문은 잠겨 있다. 옆의 거울을 살펴보자.');
    setObj('옆의 거울을 살펴보자 — 마지막 한 장의 힌트가 있을 것 같다');
   }
   autoDoors(); upTarget();
  } else pr.style.display='none';
 }
 camera.position.set(Pl.x,Pl.y+EYE+Math.sin(Pl.bob)*.04,Pl.z);
 camera.rotation.y=Pl.yaw;camera.rotation.x=Pl.pitch;
 cullAcc+=dt; if(cullAcc>0.2){ cullAcc=0; cullLights(); }
 renderer.render(scene,camera);
}
requestAnimationFrame(loop);
</script>
</body>
